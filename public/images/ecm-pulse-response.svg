<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 410" font-family="system-ui,-apple-system,sans-serif">

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrRed" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrRedFlip" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrViolet" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrVioletFlip" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="410" fill="#f8fafc" rx="10"/>
  <rect x="10" y="10" width="600" height="390" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ─── PHASE LABELS ─── -->
  <text x="115" y="32" font-size="11" fill="#94a3b8" text-anchor="middle">rest</text>
  <text x="255" y="32" font-size="11" fill="#94a3b8" text-anchor="middle">discharge pulse</text>
  <text x="455" y="32" font-size="11" fill="#94a3b8" text-anchor="middle">rest</text>

  <!-- Phase divider lines -->
  <line x1="170" y1="38" x2="170" y2="375" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="38" x2="350" y2="375" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── CURRENT PANEL ─── -->
  <text x="38" y="93" font-size="13" fill="#64748b" text-anchor="middle" font-style="italic">I</text>

  <!-- Current zero line (faint) -->
  <line x1="65" y1="118" x2="560" y2="118" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Current trace -->
  <polyline points="65,118 170,118 170,58 350,58 350,118 560,118"
            fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- I_d label -->
  <text x="260" y="50" font-size="12" fill="#4f46e5" text-anchor="middle" font-style="italic">I<tspan baseline-shift="sub" font-size="9">d</tspan></text>

  <!-- 0 label -->
  <text x="57" y="122" font-size="11" fill="#94a3b8" text-anchor="end">0</text>

  <!-- Current axis arrow -->
  <line x1="65" y1="130" x2="65" y2="42" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ─── PANEL SEPARATOR ─── -->
  <line x1="25" y1="150" x2="595" y2="150" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ─── VOLTAGE PANEL ─── -->
  <text x="38" y="270" font-size="13" fill="#64748b" text-anchor="middle" font-style="italic">V<tspan baseline-shift="sub" font-size="9">t</tspan></text>

  <!-- OCV dashed reference line (y=185) -->
  <line x1="65" y1="190" x2="560" y2="190" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="568" y="194" font-size="11" fill="#94a3b8">OCV</text>

  <!-- Voltage trace -->
  <!-- Phase 0: rest at OCV -->
  <line x1="65" y1="190" x2="170" y2="190" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Instant R0 drop at pulse start (190 → 216) -->
  <line x1="170" y1="190" x2="170" y2="216" stroke="#1e293b" stroke-width="2.5"/>

  <!-- RC charging curve (216 → 246) -->
  <path d="M170,216 C198,232 300,244 350,246"
        fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Instant R0 jump at pulse end (246 → 220) -->
  <line x1="350" y1="246" x2="350" y2="220" stroke="#1e293b" stroke-width="2.5"/>

  <!-- RC decay curve (220 → 191) -->
  <path d="M350,220 C378,207 468,192 560,191"
        fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Voltage axis arrow -->
  <line x1="65" y1="360" x2="65" y2="168" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ─── ANNOTATIONS ─── -->

  <!-- R0 drop: double arrow x=145, y=190 to y=216 -->
  <line x1="148" y1="193" x2="148" y2="213"
        stroke="#dc2626" stroke-width="1.5"
        marker-end="url(#arrRed)" marker-start="url(#arrRedFlip)"/>
  <text x="140" y="205" font-size="11" fill="#dc2626" text-anchor="end">R₀·I</text>

  <!-- R0 jump: double arrow x=375, y=220 to y=246 -->
  <line x1="372" y1="223" x2="372" y2="243"
        stroke="#dc2626" stroke-width="1.5"
        marker-end="url(#arrRed)" marker-start="url(#arrRedFlip)"/>
  <text x="380" y="235" font-size="11" fill="#dc2626">R₀·I</text>

  <!-- RC charging label -->
  <path d="M200,262 C215,272 230,274 248,268"
        fill="none" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrViolet)"/>
  <text x="185" y="279" font-size="11" fill="#7c3aed">τ₁ = R₁C₁</text>

  <!-- RC decay label -->
  <path d="M460,210 C455,220 430,225 408,218"
        fill="none" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrViolet)"/>
  <text x="462" y="208" font-size="11" fill="#7c3aed">τ₁ decay</text>

  <!-- Asymptote dashed line: OCV - I(R0+R1) at y=246 -->
  <line x1="170" y1="248" x2="350" y2="248"
        stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="260" y="261" font-size="10" fill="#7c3aed" text-anchor="middle">OCV − I(R₀+R₁)</text>

  <!-- ─── TIME AXIS ─── -->
  <line x1="65" y1="375" x2="560" y2="375" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <text x="566" y="379" font-size="12" fill="#64748b" font-style="italic">t</text>

  <!-- t0, t1 tick marks -->
  <line x1="170" y1="372" x2="170" y2="378" stroke="#94a3b8" stroke-width="1"/>
  <text x="170" y="390" font-size="11" fill="#64748b" text-anchor="middle">t₀</text>
  <line x1="350" y1="372" x2="350" y2="378" stroke="#94a3b8" stroke-width="1"/>
  <text x="350" y="390" font-size="11" fill="#64748b" text-anchor="middle">t₁</text>

</svg>
